<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="趣味のドライフラワーを紹介するプロフィールサイトです。これまでに作った作品を掲載していますので、よろしければご覧になってみてください。"
    />
    <title>Dry Flower Life</title>
    <link rel="icon" href="img/favicon.ico" />
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header l-wrapper">
      <h1 class="header__logo">
        <a href="#" class="header__logo-link">
          <img
            src="img/logo.svg"
            alt="Dry Flower Life"
            class="header__logo-image"
          />
        </a>
      </h1>
      <nav class="header__nav" aria-label="ナビゲーション">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a href="#profile" class="header__nav-link">Profile</a>
          </li>
          <li class="header__nav-item">
            <a href="#works" class="header__nav-link">Works</a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- Main -->
    <main class="l-wrapper">
      <!-- MainVisual -->
      <div class="mainvisual">
        <div class="mainvisual__image">
          <img
            src="img/mainvisual.jpg"
            alt="ドライフラワーのインテリア写真"
            class="mainvisual__image-img"
          />
        </div>
        <div class="mainvisual__content">
          <p class="mainvisual__lead">
            ドライフラワーのある生活で暮らしを豊かに
          </p>
          <p class="mainvisual__text">
            アンティークな雰囲気を持ったドライフラワーは、インテリアとして生活を彩るだけでなく香りを楽しむこともできます。<br />
            あなたの暮らしにもドライフラワーを取り入れてみませんか？
          </p>
        </div>
      </div>
      <!-- Profile Section -->
      <section id="profile" class="profile">
        <div class="profile__content">
          <h2 class="c-section__title">
            <span class="c-section__title-en">Profile</span>
            <span class="c-section__title-ja">自己紹介</span>
          </h2>
          <p class="profile__description">
            趣味でドライフラワー作りを始め、現在はドライフラワー作家として活動しています。<br />
            インテリアとしてだけでなく、お誕生日や記念日等、お祝い用のフラワーアレンジメントも行っています。
          </p>
        </div>
        <div class="profile__image">
          <img
            class="profile__img"
            src="img/profile.jpg"
            alt="ドライフラワー作家のプロフィール写真"
          />
        </div>
      </section>
      <!-- Works Section -->
      <section id="works" class="works">
        <h2 class="c-section__title">
          <span class="c-section__title-en">Works</span>
          <span class="c-section__title-ja">作品一覧</span>
        </h2>
        <ul class="works__list">
          <li class="works__item">
            <img
              src="img/works1.jpg"
              alt="ドライフラワー作品1"
              class="works__img"
            />
          </li>
          <li class="works__item">
            <img
              src="img/works2.jpg"
              alt="ドライフラワー作品2"
              class="works__img"
            />
          </li>
          <li class="works__item">
            <img
              src="img/works3.jpg"
              alt="ドライフラワー作品3"
              class="works__img"
            />
          </li>
          <li class="works__item">
            <img
              src="img/works4.jpg"
              alt="ドライフラワー作品4"
              class="works__img"
            />
          </li>
          <li class="works__item">
            <img
              src="img/works5.jpg"
              alt="ドライフラワー作品5"
              class="works__img"
            />
          </li>
          <li class="works__item">
            <img
              src="img/works6.jpg"
              alt="ドライフラワー作品6"
              class="works__img"
            />
          </li>
        </ul>
      </section>
    </main>
    <!-- Footer -->
    <footer class="footer l-wrapper">
      <p class="footer__text">
        <small class="footer__copyright">© Dry Flower Life.</small>
      </p>
    </footer>
  </body>
</html>
